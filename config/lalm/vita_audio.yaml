# @package _group_
name: vita_audio
scheme: discrete
audio_type: [speech]
voice_chat: true
tool_use: false
accum_grad: false
weight_path:
  tokenizer_path: ${weight_dir}/encoder/GLM-4-Voice-tokenizer
  lalm_path: ${weight_dir}/lalm/VITA-Audio-Boost
parameter:
  ignore_index: -100
generate_kwargs:
  chat_format: chatml
  do_sample: true
  bos_token_id: 151643
  eos_token_id: [151645, 151643]
  pad_token_id: 151643
  mtp_inference_mode: [1, 10, 4, 10]
  repetition_penalty: 1.05
  temperature: 0.7
  top_k: 20
  top_p: 0.8
  max_new_tokens: 512
  use_cache: true
fbank_config:
  sample_rate: 16000
  n_fft: 400
  win_length: 400
  hop_length: 160
  chunk_length: 30
  n_mels: 128
  n_samples: 480000
  min_frequency: 0.0
  max_frequency: 8000.0
